<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Divider</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">💸 Expense Divider</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="groupDropdown" role="button" data-bs-toggle="dropdown">
              Select Group
            </a>
            <ul class="dropdown-menu" id="groupList">
              <li><a class="dropdown-item" href="#" onclick="createNewGroup()">Create New Group</a></li>
            </ul>
          </li>
        </ul>
        <div class="d-flex">
          <select class="form-select currency-selector me-2" id="currencySelect" style="width: auto;">
            <option value="INR">INR (₹)</option>
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="GBP">GBP (£)</option>
          </select>
          <button class="btn btn-outline-light me-2" onclick="exportToCSV()">Export to CSV</button>
          <button class="btn btn-outline-light" onclick="checkNotifications()">Check Balances</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <!-- Dashboard -->
    <div class="row mb-4">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title">Expense Overview</h5>
          </div>
          <div class="card-body">
            <canvas id="expenseChart" width="400" height="200"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title">Summary</h5>
          </div>
          <div class="card-body">
            <div id="summary" class="text-center">
              <h3 class="text-primary">Total Expenses: ₹0.00</h3>
            </div>
            <div id="participantSummary" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Forms Row -->
    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title">Add Participant</h5>
          </div>
          <div class="card-body">
            <form id="participantForm">
              <div class="input-group mb-3">
                <input type="text" class="form-control" id="newParticipant" placeholder="Enter participant name" required>
                <button class="btn btn-primary" type="submit">Add Person</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title">Add Expense</h5>
          </div>
          <div class="card-body">
            <form id="expenseForm">
              <div class="mb-3">
                <label for="payerSelect" class="form-label">Who paid?</label>
                <select class="form-select" id="payerSelect" required>
                  <option value="">Select payer</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="amount" class="form-label">Amount</label>
                <input type="number" class="form-control" id="amount" placeholder="Enter amount" step="0.01" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Split among:</label>
                <div id="participantCheckboxes"></div>
              </div>
              <button type="submit" class="btn btn-success">Add Expense</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Expense List -->
    <div class="card">
      <div class="card-header">
        <h5 class="card-title">Expense List</h5>
      </div>
      <div class="card-body">
        <div id="expenseList"></div>
      </div>
    </div>
  </div>

  <!-- Create Group Modal -->
  <div class="modal fade" id="createGroupModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Create New Group</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="createGroupForm">
            <div class="mb-3">
              <label for="groupName" class="form-label">Group Name</label>
              <input type="text" class="form-control" id="groupName" placeholder="e.g., Trip to Ooty" required>
            </div>
            <div class="mb-3">
              <label for="groupCurrency" class="form-label">Base Currency</label>
              <select class="form-select" id="groupCurrency">
                <option value="INR">INR (₹)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="GBP">GBP (£)</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveNewGroup()">Create Group</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
